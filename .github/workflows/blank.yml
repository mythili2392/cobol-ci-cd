name: CI-CD Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Install Docker if not present
            if ! command -v docker &> /dev/null
            then
              sudo apt update
              sudo apt install docker.io -y
              sudo systemctl start docker
            fi

            # Clone repo if not exists
            if [ ! -d "cobol-ci-cd" ]; then
              git clone https://github.com/mythili2392/cobol-ci-cd.git
            fi

            cd cobol-ci-cd

            # Pull latest code
            git pull origin main

            # Stop services using port 80
            sudo systemctl stop nginx || true
            sudo systemctl stop apache2 || true

            # Stop & remove old container
            docker stop cobol-app || true
            docker rm cobol-app || true

            # Remove old image
            docker rmi cobol-app || true

            # Build new image
            docker build -t cobol-app .

            # Run container
            docker run -d -p 80:80 --name cobol-app cobol-app

